<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Card Design</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body style="background-color: #01E37F;">

    <div class="box">

        <div class="sidebox">

            <div class="img">
                <img src="./Images/apple--.png" class="apple">
                <span class="material-symbols--share"></span>
                <span class="line-md--heart"></span>

                 <div class="small-apple">
            <img src="./Images/apple1.png" class="apple1">
            <img src="./Images/apple2.png" class="apple2">
            <img src="./Images/apple1.png" class="apple3">
            <img src="./Images/apple2.png" class="apple4">
        </div>
        
          <div class="details">
            
            <h2 class="heading">DeliciousApples</h2>
            <p class="code">COD:45999</p><br>
            <p class="code1">R$</p>
            <h1 class="price">7.93</h1><br>

             <h4>Benefits</h4>

            <ul>
                <li>Apples are nutritious</li>
                <li>Apples may be good for weight loss</li>
                <li>Apples may be good for bone health</li>
                <li>They're linked to a lower risk of diabetes</li>
            </ul>

            <button>Add to Cart</button>
            </div> 
            
        </div>
    </div>
</div>
    
</body>
</html>
